<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEPSE Tools</title>
  <link rel="stylesheet" href="dist/output.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-surface text-gray-200 min-h-screen">

  <header class="border-b border-border bg-card/60 backdrop-blur-sm">
    <div class="max-w-4xl mx-auto px-4 py-6 text-center">
      <div class="w-12 h-12 rounded-xl bg-accent flex items-center justify-center mx-auto mb-3">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18M7 16l4-4 4 4 5-5"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">NEPSE Tools</h1>
      <p class="text-sm text-muted mt-1">A collection of mini tools for NEPSE investors</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

      <a href="trade-calc/" class="bg-card rounded-xl border border-border p-6 hover:border-accent/50 transition group">
        <div class="w-10 h-10 rounded-lg bg-blue-500/15 flex items-center justify-center mb-4">
          <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        </div>
        <h2 class="text-white font-semibold mb-1 group-hover:text-accent transition">Trade Calculator</h2>
        <p class="text-sm text-muted">Profit/loss, WACC, break-even price with all NEPSE charges included.</p>
      </a>

      <a href="risk-calc/" class="bg-card rounded-xl border border-border p-6 hover:border-accent/50 transition group">
        <div class="w-10 h-10 rounded-lg bg-orange-500/15 flex items-center justify-center mb-4">
          <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M5.07 19H19a2 2 0 001.75-2.96l-6.93-12a2 2 0 00-3.5 0l-6.93 12A2 2 0 005.07 19z"/></svg>
        </div>
        <h2 class="text-white font-semibold mb-1 group-hover:text-accent transition">Risk Calculator</h2>
        <p class="text-sm text-muted">Stop loss, profit targets, risk-reward ratios, and portfolio tracking.</p>
      </a>

    </div>
  </main>

  <footer class="text-center text-xs text-muted py-6 border-t border-border mt-8">
    NEPSE Tools &middot; For informational purposes only
  </footer>

</body>
</html>
